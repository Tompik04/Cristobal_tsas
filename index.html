<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRISTOBAL</title>
  <link rel="icon" type="image/x-icon" href="img/icon_cristobal.ico">
  <link rel="shortcut icon" type="image/x-icon" href="img/icon_cristobal.ico">
  <link rel="apple-touch-icon" href="img/icon_cristobal.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Pantalla de login -->
  <div id="login" class="login-screen">
    <div class="login-box">
      <div class="login-logo" id="loginLogo"></div>
      <h1 class="login-title">CRISTOBAL</h1>
      <p class="login-sub">Ingresá tu PIN</p>
      <div class="pin-dots" id="pinDots">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="pin-pad" id="pinPad"></div>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- App (oculta hasta login) -->
  <div id="app" class="app hidden">
    <div id="bgLogo" class="bg-logo"></div>
    <header id="appHeader" class="app-header"></header>
    <main id="view" class="view"></main>
    <div id="cartRoot"></div>
    <div id="modalRoot"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/views/home.js"></script>
  <script src="js/views/ventas.js"></script>
  <script src="js/views/stock.js"></script>
  <script src="js/views/cambios.js"></script>
  <script src="js/views/vouchers.js"></script>
  <script src="js/views/historial.js"></script>
  <script src="js/views/gastos.js"></script>
  <script src="js/views/caja.js"></script>
  <script src="js/views/cuentas.js"></script>
  <script src="js/views/informes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
